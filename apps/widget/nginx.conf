server {
  listen 8080;
  server_name _;

  location /widget.js {
    add_header Cache-Control "public, max-age=300";
    add_header Access-Control-Allow-Origin "*";
    try_files /widget.js =404;
  }

  location / {
    add_header Access-Control-Allow-Origin "*";
    try_files $uri /widget.js;
  }
}
